<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectrum-similarity network — UniGE Data Visualisation</title>
  </head>
  <body>
    <main>
      <h1>Spectrum-similarity network</h1>
      <p class="sub">D3.js module · the application grown across Sessions 2 and 3.</p>
      <div class="panels">
        <section class="panel">
          <header class="panel-header">
            <h2>The network</h2>
            <label class="threshold">
              cosine threshold
              <input id="threshold" type="range" min="0.05" max="0.95" step="0.01" value="0.55" />
              <span id="threshold-value">0.55</span>
            </label>
          </header>
          <div id="network"></div>
        </section>
        <section class="panel">
          <h2>Selected spectrum</h2>
          <div id="detail"></div>
        </section>
      </div>
      <p id="status" class="status"></p>
    </main>
    <!-- Vite turns this single entry point into the whole app. -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
