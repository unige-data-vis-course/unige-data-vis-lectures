# Two-container setup for the D3.js module app.
#
#   data-service  serves the spectra dataset on port 8081
#   app           builds the Vite + TS app and serves it via nginx on port 8080
#
# Production (static build, nginx):
#
#     docker compose up --build      # build and run
#     # open http://localhost:8080
#     docker compose down
#
# Development (Vite HMR, file-watching — no restart needed on code changes):
#
#     docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#     # open http://localhost:8080 — edits in app_network/src/ reload live
#
# The app's browser code fetches from http://localhost:8081/spectra. That URL
# works because compose maps the data-service container's port 8081 to the
# host's port 8081 — same address the browser uses in `npm run dev`.

services:
  data-service:
    build: ./data-service
    container_name: d3js-data-service
    ports:
      - "8081:8081"
    restart: unless-stopped

  app:
    build: ./app_network
    container_name: d3js-app
    ports:
      - "8080:80"
    depends_on:
      - data-service
    restart: unless-stopped
